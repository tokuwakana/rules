# url 里填写自己的订阅,名称不能重复
proxy-providers:
  subscribe:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    url: "https://submit.xz61.cn:22443/api/v1/client/subscribe?token=55c1e026db56f1459d39e83220f8a4cb"    

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
  
# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: "/etc/mihomo/run/ui"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 匹配进程 always/strict/off
find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 30

# 策略组选择和fakeip缓存
profile:
  store-selected: true
  store-fake-ip: true
  
# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    
# 代理模式
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  
# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  # 模式切换 redir-host / fake-ip
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  # 模式切换 whitelist/blacklist 
  # 黑名单模式表示如果匹配成功则不返回 Fake-IP, 白名单模式时只有匹配成功才返回 Fake-IP
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain,fix-direct"
    - "+.services.googleapis.cn"
    - "+.xn--ngstr-lra8j.com"
    - "time.*.com"
    - "+.pool.ntp.org"
    - "+.ntp.tencent.com"
    - "+.ntp1.aliyun.com"
    - "+.ntp.ntsc.ac.cn"
    - "+.cn.ntp.org.cn"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29    
    
proxy-groups:
  - {name: Proxy, type: select, proxies: [Auto-Urltest, Manual, DIRECT]}
  
  - {name: Manual, type: select, include-all: true}
  
  - {name: OpenAI, type: select, proxies: [Manual, Auto-Urltest, DIRECT]}
  
  - {name: Streaming, type: select, proxies: [Auto-Urltest, Manual, DIRECT]} 
  
  - {name: StreamCN, type: select, proxies: [DIRECT, Auto-Urltest, Manual]}
  
  - {name: Auto-Urltest, type: url-test, include-all: true, tolerance: 20, interval: 300}
  
  - {name: FINAL, type: select, proxies: [DIRECT, Auto-Urltest, Manual]}
rules:
  # >屏蔽QUIC
  #  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT-DROP
  # 常用必备
  # - DST-PORT,123,DIRECT
  - IP-CIDR,95.161.76.100/31,REJECT-DROP,no-resolve
  # 域名路由
  - RULE-SET,fix-proxy,Proxy
  - RULE-SET,fix-direct,DIRECT
  - RULE-SET,apple,DIRECT  
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,github_domain,Proxy 
  - RULE-SET,ai,OpenAI
  - RULE-SET,microsoft_domain,DIRECT
  - RULE-SET,youtube_domain,Streaming
  - RULE-SET,google_domain,Proxy
  - RULE-SET,telegram_domain,Proxy
  - RULE-SET,bilibili_domain,StreamCN
  - RULE-SET,gfw_domain,Proxy
  - RULE-SET,geolocation-!cn,Proxy
  - RULE-SET,cn_domain,DIRECT
 # IP路由 
  - RULE-SET,google_ip,Proxy,no-resolve
  - RULE-SET,telegram_ip,Proxy,no-resolve
  - RULE-SET,cn_ip,DIRECT
  - MATCH,FINAL
  
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

# 添加缓存文件路径
cache-file: "/etc/nikki/cache/geodata.cache"

rule-providers: 
  fix-proxy: {!!merge <<: *class, url: "https://raw.githubusercontent.com/tokuwakana/rules/refs/heads/main/Proxy%2B.list"} 
  fix-direct: {!!merge <<: *class, url: "https://raw.githubusercontent.com/tokuwakana/rules/refs/heads/main/Direct%2B.list"} 
  private_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  ai: { <<: *domain, url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ai-chat-!cn.mrs" }
  youtube_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  google_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
  github_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"}
  telegram_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"}
  microsoft_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/microsoft%40cn.mrs"}
  apple: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple-cn.mrs"}
  bilibili_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bilibili.mrs"}
  speedtest_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/ookla-speedtest.mrs"}
  gfw_domain: {!!merge <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs"}
