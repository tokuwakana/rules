# url 里填写自己的订阅,名称不能重复
proxy-providers:
  subscribe:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    url: "https://submit.xz61.cn:22443/api/v1/client/subscribe?token=55c1e026db56f1459d39e83220f8a4cb"
    
proxies: 

port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894
unified-delay: true
tcp-concurrent: true
find-process-mode: 'strict'
global-client-fingerprint: chrome
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
ipv6: false
udp: true
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

external-controller: 0.0.0.0:9090
external-ui-url: https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip
external-ui: ui
external-ui-name: metacubexd
secret: 123456
# 自定 GEO 下载地址
geodata-mode: false                  # 更改 geoip 使用文件，mmdb 或者 dat，可选 true/false,true为 dat，此项有默认值 false
geodata-loader: memconservative      # GEO 文件加载模式，standard：标准加载器 memconservative：专为内存受限 (小内存) 设备优化的加载器 (默认值)
geo-auto-update: true                # 自动更新 GEO
geo-update-interval: 24              # 更新间隔，单位为小时
geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - 'rule-set:cn_domain,private_domain,fix-direct'
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    #  语音通信
    - '+.vivox.com'
    # 向日葵服务
    - '+.oray.com'
    - '+.sunlogin.net'
    
tun:
  enable: true
  stack: mixed
  dns-hijack: [any:53]
  
dns:
  enable: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - 'rule-set:cn_domain,private_domain,fix-direct'
    - '*.lan'
    - '*.local'
    - '*.home.arpa'
    - '+.gitv.tv'
    - '+.docker.io'
    - '+.miwifi.com'
    - '+.safebrowsing.apple'
    - Mijia Cloud
    #放行NTP服务
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time-ios.apple.com
    - time1.*.com
    - time2.*.com
    - time3.*.com
    - time4.*.com
    - time5.*.com
    - time6.*.com
    - time7.*.com
    - ntp.*.com
    - ntp1.*.com
    - ntp2.*.com
    - ntp3.*.com
    - ntp4.*.com
    - ntp5.*.com
    - ntp6.*.com
    - ntp7.*.com
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - time1.cloud.tencent.com
    
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29    
    
proxy-groups:
  - {name: Proxy, type: select, proxies: [Auto-Urltest, Manual, DIRECT]}
  
  - {name: Manual, type: select, include-all: true}
  
  - {name: OpenAI, type: select, proxies: [Manual, Auto-Urltest, DIRECT]}
  
  - {name: Streaming, type: select, proxies: [Auto-Urltest, Manual, DIRECT]} 
  
  - {name: StreamCN, type: select, proxies: [DIRECT, Auto-Urltest, Manual]}
  
  - {name: Auto-Urltest, type: url-test, include-all: true, tolerance: 10}
  
  - {name: FINAL, type: select, proxies: [DIRECT, Auto-Urltest, Manual]}
rules:
  # >屏蔽QUIC
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT-DROP
  # 常用必备
  - DST-PORT,123,DIRECT
  - IP-CIDR,95.161.76.100/31,REJECT-DROP,no-resolve
  # 域名路由
  - RULE-SET,fix-proxy,Proxy
  - RULE-SET,fix-direct,DIRECT
  - RULE-SET,apple,DIRECT  
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,github_domain,Proxy 
  - RULE-SET,ai,OpenAI
  - RULE-SET,twitter_domain,Proxy
  - RULE-SET,microsoft_domain,DIRECT
  - RULE-SET,youtube_domain,Streaming
  - RULE-SET,google_domain,Proxy
  - RULE-SET,telegram_domain,Proxy
  - RULE-SET,netflix_domain,Streaming
  - RULE-SET,bilibili_domain,StreamCN
  - RULE-SET,spotify_domain,Streaming
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,geolocation-!cn,Proxy
  - DOMAIN-REGEX,^[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)+$,FINAL
 # IP路由 
  - RULE-SET,google_ip,Proxy,no-resolve
  - RULE-SET,netflix_ip,Streaming,no-resolve
  - RULE-SET,telegram_ip,Proxy,no-resolve
  - RULE-SET,twitter_ip,Proxy,no-resolve
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - MATCH,FINAL

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
